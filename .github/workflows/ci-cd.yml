name: MERN CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------
  # 1. Build & Test Job
  # -------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Backend install & test
        run: |
          cd backend
          npm install
          npm test

      - name: Frontend install & test
        run: |
          cd frontend
          npm install
          npm test

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build Docker images
        run: |
          docker build -t irtaza0007/backend ./backend
          docker build -t irtaza0007/frontend ./frontend

      - name: Push Docker images
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "irtaza0007" --password-stdin
          docker push irtaza0007/backend
          docker push irtaza0007/frontend

  # -------------------
  # 2. Deploy Job
  # -------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build   # only runs if build succeeds

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Backend .env injection
            cd /home/${{ secrets.SERVER_USER }}/webserver/backend
            echo "MONGODB_URL=${{ secrets.MONGODB_URL }}" > .env
            echo "PORT=5555" >> .env

            # Frontend .env injection
            cd /home/${{ secrets.SERVER_USER }}/webserver/frontend
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env

            # Restart stack
            cd /home/${{ secrets.SERVER_USER }}/webserver
            docker-compose pull
            docker-compose up -d --remove-orphans