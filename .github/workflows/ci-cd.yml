name: MERN CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Node.js for lint/tests
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Install & test backend
      - name: Backend install & test
        run: |
          cd backend
          npm install
          npm test

      # 4. Install & test frontend
      - name: Frontend install & test
        run: |
          cd frontend
          npm install
          npm test

      # 5. Build frontend for production
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 6. Build Docker images
      - name: Build Docker images
        run: |
          docker build -t irtaza0007/backend ./backend
          docker build -t irtaza0007/frontend ./frontend

      # 7. Push Docker images to Docker Hub
      - name: Push Docker images
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "irtaza0007" --password-stdin
          docker push irtaza0007/backend
          docker push irtaza0007/frontend

      # 8. Deploy to server (e.g., AWS EC2)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/webserver
            docker-compose pull
            docker-compose up -d --remove-orphans